name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: carrierflow

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-bookworm
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: carrierflow_test
          POSTGRES_INITDB_ARGS: "--locale=C.UTF-8 --encoding=UTF8"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/carrierflow_test
      DIRECT_URL: postgresql://postgres:password@localhost:5432/carrierflow_test
      AUTH_SECRET: ci-e2e-auth-secret-min-32-chars-long
      AUTH_URL: http://127.0.0.1:3000
      STORAGE_PROVIDER: local
      SEED_ADMIN_PASSWORD: changeme123
      NEXT_TELEMETRY_DISABLED: 1
      PRISMA_HIDE_UPDATE_MESSAGE: 1

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: carrierflow/package-lock.json

      - name: Install
        run: npm ci

      - name: Validate Prisma
        run: npx prisma validate

      - name: Migrate
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: carrierflow/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('carrierflow/package-lock.json') }}-${{ hashFiles('carrierflow/**/*.ts', 'carrierflow/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('carrierflow/package-lock.json') }}-

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
